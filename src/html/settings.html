<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TS Memory</title>
    <script type="module" src="../main.ts" defer></script>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="icon" href="../assets/icons/it_logo_favicon.svg" type="image/svg+xml">
</head>
<body>
    <div class="content-wrapper content-wrapper__background_color">
        <div class="settings-wrapper">
            <header class="headline">
                <h2>Settings
                    <img src="../assets/icons/yellow_line_long_icon.svg" class="headline__yellow_line_icon" alt="yellow line icon">
                </h2>
            </header>
            <section class="settings-container">
                <div class="settings-container__options settings-container__options--left">
                    <section class="options-container">
                        <div class="options-container__headline-container">
                            <img src="../assets/icons/theme_icon.svg" alt="theme icon">
                            <h3>Game themes</h3>
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option1" name="gruppe1" value="a">
                            <label for="option1">Code vibes theme</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option2" name="gruppe1" value="b">
                            <label for="option2">Gaming theme</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                    </section>
                    <section class="options-container">
                        <div class="options-container__headline-container">
                            <img src="../assets/icons/chess_pawn_icon.svg" alt="chess pawn icon">
                            <h3>Choose player</h3>
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option1" name="gruppe2" value="a">
                            <label for="option1">Blue</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option2" name="gruppe2" value="b">
                            <label for="option2">Orange</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                    </section>
                    <section class="options-container">
                        <div class="options-container__headline-container">
                            <img src="../assets/icons/board_size_icon.svg" alt="board size icon">
                            <h3>Board size</h3>
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option1" name="gruppe3" value="a">
                            <label for="option1">16 cards</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option2" name="gruppe3" value="b">
                            <label for="option2">24 cards</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                        <div class="options-container__element">
                            <input type="radio" id="option3" name="gruppe3" value="c">
                            <label for="option3">36 cards</label>
                            <img src="../assets/icons/yellow_line_icon.svg" alt="active option icon" class="options-container__element--active_option_icon">
                        </div>
                    </section>
                </div>
                <div class="settings-container__options settings-container__options--right settings-container__preview">
                    <img src="../assets/images/gaming_logo.svg" alt="board preview image" class="settings-container__preview--theme_1_image">
                    <!-- <img src="../assets/images/it_logo.svg" alt="board preview image" class="settings-container__preview--theme_2_image"> -->
                    <section class="selection-container">
                        <p>Game theme</p>
                        <img src="../assets/icons/yellow_slash_line_icon.svg" alt="yellow slash line icon" class="selection-container__yellow_slash_line_icon">
                        <p>Player</p>
                        <img src="../assets/icons/yellow_slash_line_icon.svg" alt="yellow slash line icon" class="selection-container__yellow_slash_line_icon">
                        <p>Board size</p>
                        <a href="./game_board.html" class="button-section-settings">
                            <button class="button button__secondary button__secondary--start_game">
                                <img src="../assets/icons/play_icon.svg" class="button__secondary--controller_icon" alt="play icon">
                                Start
                            </button>
                        </a>
                        </section>
                        </section>
                    
                </div>
            </section>
        </div>
    </div>
    
</body>
</html>
