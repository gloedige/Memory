<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TS Memory</title>
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="icon" href="../assets/icons/it_logo_favicon.svg" type="image/svg+xml">
    <script type="module" src="/src/main.ts" defer></script>
</head>
<body>
    <div class="content-wrapper">
        <dialog class="exit-game-dialog" id="dialog">
            <p class="exit-game-dialog__question">Are you shure you want to quit the game?</p>
            <section class="exit-game-dialog__button-section">
                <button class="button button__dialog button__dialog--back-button" id="back_to_game">
                    Back to Game
                </button>
                <button class="button button__dialog button__dialog--exit-button">
                    Exit Game
                </button>
            </section>
        </dialog>
        <div class="game-board-wrapper">
            <header class="game-board-header">
                <section class="score-board">
                    <div class="score-board__item">
                        <img src="../assets/icons/label_blue_player.svg" alt="">
                        <span class="score-board__item--blue">Blue</span>
                        <span class="score-board__item--blue" id="score_blue">0</span>
                    </div>
                    <div class="score-board__item">
                        <img src="../assets/icons/label_orange_player.svg" alt="">
                        <span class="score-board__item--orange">Orange</span>
                        <span class="score-board__item--orange" id="score_orange">0</span>
                    </div>
                </section>
                <section class="next-turn">
                    <span class="next-turn__player">Current Player:</span>
                    <img src="../assets/icons/label_blue_player.svg" class="next-turn__current-player-blue" alt="blue player">
                    <img src="../assets/icons/label_orange_player.svg" class="next-turn__current-player-orange" alt="orange player">
                </section>
                <button class="button button__primary button__primary--exit_game" id="exit_game_button">
                    <img src="../assets/icons/exit_game_icon.svg" class="button__primary--controller_icon" alt="exit game icon">
                    Exit Game
                </button>
            </header>
            <section class="field" id="field">
                <button class="card">
                    <div class="card__inner">
                        <div class="card__face card__face--front"></div>
                        <div class="card__face card__face--back"></div>
                    </div>
                </button>
                <button class="card">
                    <div class="card__inner">
                        <div class="card__face card__face--front"></div>
                        <div class="card__face card__face--back"></div>
                    </div>
                </button>
            </section>
        </div>
    </div>
    
</body>
</html>
